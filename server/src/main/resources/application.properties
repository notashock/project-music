spring.application.name=server
# App runs on port 8080 by default, let's keep it clean
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./music-data/db;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Hibernate - auto-create the tables based on our Java classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Enable the H2 web console to view your data manually
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Path to your music library
music.library.path=C:/Users/ashub_bysvvo7/Music/Music